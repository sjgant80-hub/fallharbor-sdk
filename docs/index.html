<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FallHarbor SDK · Playground</title>
<style>
:root{--void:#1a1a1e;--deep:#212127;--surface:#2a2a30;--line:rgba(232,228,219,0.08);--text:#e8e4db;--muted:#928d80;--sage:#7a9c7e;--amber:#d4a052;--mono:'JetBrains Mono','IBM Plex Mono',monospace;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--void);color:var(--text);font-family:var(--sans);padding:24px;max-width:1100px;margin:0 auto;line-height:1.55}
h1{font-family:var(--serif);font-size:32px;margin-bottom:6px}
h1 em{color:var(--sage);font-style:italic}
.sub{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:16px;margin-bottom:20px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
input,select,button{font-family:var(--mono);font-size:12px;background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 12px}
input{flex:1;min-width:200px}
button{cursor:pointer;background:var(--sage);color:var(--void);font-weight:600;text-transform:uppercase;letter-spacing:0.12em}
button.ghost{background:transparent;color:var(--text)}
.card{background:var(--deep);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.card h3{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:10px}
pre{font-family:var(--mono);font-size:11.5px;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface);padding:12px;border-radius:8px;max-height:400px;overflow:auto}
.stat{display:inline-block;margin-right:20px;font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.stat strong{color:var(--sage);font-size:15px;font-weight:600;margin-right:4px}
.tool{border-bottom:1px solid var(--line);padding:10px 0}
.tool:last-child{border:none}
.tool .n{font-family:var(--serif);font-size:17px;color:var(--text)}
.tool .n em{color:var(--sage)}
.tool .m{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
.tool .d{color:var(--muted);font-size:13px;margin-top:4px}
footer{text-align:center;color:var(--muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;padding:24px 0}
footer a{color:var(--sage);text-decoration:none}
</style>
</head>
<body>
<h1>FallHarbor <em>SDK</em> · playground</h1>
<div class="sub">Live demo of <code>@ai-native-solutions/fallharbor-sdk</code>. Point at any FallHarbor-compatible manifest URL.</div>

<div class="row">
  <input id="url" value="https://sjgant80-hub.github.io/fallharbor/manifest.json" placeholder="manifest.json URL">
  <button id="load">Load manifest</button>
</div>
<div class="row">
  <input id="q" placeholder="search · name · capability · description">
  <select id="vis"><option value="all">All</option><option value="public">Public</option><option value="private">Private</option></select>
  <button class="ghost" id="refilter">Filter</button>
</div>

<div class="card"><h3>stats</h3><div id="stats">—</div></div>
<div class="card"><h3>directory (filtered)</h3><div id="dir">Load a manifest to begin.</div></div>
<div class="card"><h3>lineage tree</h3><pre id="lineage">—</pre></div>
<div class="card"><h3>validation</h3><pre id="valid">—</pre></div>

<footer>◇ MIT · <a href="https://github.com/sjgant80-hub/fallharbor-sdk">source</a> · AI-Native Solutions</footer>

<script type="module">
import fh from '../src/index.js';

const $ = (id) => document.getElementById(id);
let MANIFEST = null;

async function load() {
  const url = $('url').value.trim();
  try {
    MANIFEST = await fh.fetchManifest(url);
    render();
  } catch (e) {
    $('stats').textContent = 'error: ' + e.message;
  }
}
function render() {
  if (!MANIFEST) return;
  const s = fh.stats(MANIFEST);
  $('stats').innerHTML = Object.entries(s)
    .map(([k, v]) => `<span class="stat"><strong>${v ?? '—'}</strong>${k}</span>`)
    .join('');
  const filters = { q: $('q').value, vis: $('vis').value };
  const tools = fh.filterTools(MANIFEST, filters);
  $('dir').innerHTML = tools.length
    ? tools.map((t) => `<div class="tool"><div class="n">${t.glyph || '·'} ${t.name} ${t.forks_from ? `<em>↳ ${t.forks_from}</em>` : ''}</div><div class="m">${t.category} · ${t.public ? 'public' : 'private'} · ${t.license || 'MIT'}</div><div class="d">${t.description || ''}</div></div>`).join('')
    : '<div style="color:var(--muted);font-style:italic">no tools match</div>';
  $('lineage').textContent = fh.renderLineageAscii(MANIFEST);
  const v = fh.validate(MANIFEST);
  $('valid').textContent = v.ok ? 'OK · manifest is valid' : v.errors.join('\n');
}
$('load').addEventListener('click', load);
$('refilter').addEventListener('click', render);
$('q').addEventListener('input', render);
$('vis').addEventListener('change', render);
load();
</script>
</body>
</html>
